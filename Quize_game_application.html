<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

        :root {
            --bg: #0d0d14;
            --surface: #16161f;
            --card: #1e1e2e;
            --accent: #7c6af7;
            --accent2: #f06292;
            --green: #4ade80;
            --red: #f87171;
            --yellow: #fbbf24;
            --text: #e8e8f0;
            --muted: #6b6b8a;
            --border: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124,106,247,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(240,98,146,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .quiz-wrapper {
            width: 100%;
            max-width: 680px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .q-count {
            font-size: 0.8rem;
            color: var(--muted);
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        .progress-bar {
            width: 120px;
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 99px;
            transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
        }

        /* ── CARD ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: slideIn 0.35s cubic-bezier(0.4,0,0.2,1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .type-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 99px;
            margin-bottom: 16px;
        }

        .badge-single { background: rgba(124,106,247,0.15); color: var(--accent); border: 1px solid rgba(124,106,247,0.3); }
        .badge-multi  { background: rgba(251,191,36,0.12);  color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
        .badge-fill   { background: rgba(74,222,128,0.12);  color: var(--green);  border: 1px solid rgba(74,222,128,0.3); }

        .question-text {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.5;
            color: var(--text);
            margin-bottom: 28px;
        }

        /* ── OPTIONS ── */
        .options-grid {
            display: grid;
            gap: 10px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: rgba(124,106,247,0.1);
            transform: translateX(4px);
        }

        .option-btn .marker {
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
            color: var(--muted);
        }

        .option-btn.multi .marker {
            border-radius: 6px;
        }

        .option-btn.selected .marker {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .option-btn.selected {
            border-color: var(--accent);
            background: rgba(124,106,247,0.12);
        }

        .option-btn.correct {
            border-color: var(--green) !important;
            background: rgba(74,222,128,0.12) !important;
        }

        .option-btn.correct .marker {
            background: var(--green) !important;
            border-color: var(--green) !important;
            color: white !important;
        }

        .option-btn.wrong {
            border-color: var(--red) !important;
            background: rgba(248,113,113,0.12) !important;
        }

        .option-btn.wrong .marker {
            background: var(--red) !important;
            border-color: var(--red) !important;
            color: white !important;
        }

        .option-btn:disabled { cursor: not-allowed; }

        /* ── FILL BLANK ── */
        .fill-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .fill-input:focus { border-color: var(--accent); }
        .fill-input.correct { border-color: var(--green); background: rgba(74,222,128,0.1); }
        .fill-input.wrong { border-color: var(--red); background: rgba(248,113,113,0.1); }
        .fill-input:disabled { cursor: not-allowed; }

        .fill-hint {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .fill-hint span { color: var(--green); font-weight: 600; }

        /* ── FOOTER ── */
        .card-footer {
            margin-top: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .feedback {
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .feedback.show { opacity: 1; }
        .feedback.right { color: var(--green); }
        .feedback.wrong-fb { color: var(--red); }

        .next-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            display: none;
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.03em;
        }

        .next-btn:hover { transform: scale(1.04); box-shadow: 0 4px 20px rgba(124,106,247,0.4); }
        .next-btn.visible { display: block; }

        .submit-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--green), #22c55e);
            border: none;
            border-radius: 10px;
            color: #0d0d14;
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submit-btn:hover { transform: scale(1.04); }

        /* ── SCORE ── */
        .score-screen {
            text-align: center;
            animation: slideIn 0.4s ease;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: conic-gradient(var(--accent) calc(var(--pct) * 1%), var(--surface) 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            position: relative;
        }

        .score-circle::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: var(--card);
        }

        .score-num {
            position: relative;
            z-index: 1;
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
        }

        .score-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .score-sub {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .results-breakdown {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 10px;
        }

        .stat-num { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; }
        .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }

        .restart-btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .restart-btn:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(124,106,247,0.4); }

        /* ── SPLASH ── */
        .splash {
            text-align: center;
            animation: slideIn 0.4s ease;
        }

        .splash h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .splash p { color: var(--muted); margin-bottom: 32px; line-height: 1.7; }

        .type-pills {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 36px;
        }

        .pill {
            padding: 8px 18px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .start-btn {
            padding: 16px 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover { transform: scale(1.04); box-shadow: 0 8px 28px rgba(124,106,247,0.45); }
    </style>
</head>
<body>

<div class="quiz-wrapper">
    <div class="header">
        <div class="logo">⚡ QuizZone</div>
        <div class="progress-wrap">
            <span class="q-count" id="qCount"></span>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>
    </div>
    <div class="card" id="mainCard"></div>
</div>

<script>
const questions = [
    {
        type: 'single',
        question: 'What does HTML stand for?',
        options: ['Hyper Text Markup Language', 'High Tech Machine Learning', 'Hyper Transfer Markup Language', 'Hot Text Markup Logic'],
        answer: 0
    },
    {
        type: 'multi',
        question: 'Which of the following are JavaScript frameworks or libraries? (Select all that apply)',
        options: ['React', 'Django', 'Vue.js', 'Angular', 'Laravel'],
        answers: [0, 2, 3]
    },
    {
        type: 'fill',
        question: 'CSS stands for Cascading Style ______.',
        answer: 'sheets',
        hint: 'Hint: It\'s how we style web pages'
    },
    {
        type: 'single',
        question: 'Which symbol is used to select an element by ID in CSS?',
        options: ['.', '#', '*', '@'],
        answer: 1
    },
    {
        type: 'multi',
        question: 'Which of these are valid HTTP methods? (Select all that apply)',
        options: ['GET', 'PUSH', 'POST', 'DELETE', 'SEND'],
        answers: [0, 2, 3]
    },
    {
        type: 'fill',
        question: 'In JavaScript, ______ is used to declare a constant variable.',
        answer: 'const',
        hint: 'Hint: Introduced in ES6, cannot be reassigned'
    },
    {
        type: 'single',
        question: 'Which data structure operates on a Last In First Out (LIFO) basis?',
        options: ['Queue', 'Stack', 'Linked List', 'Tree'],
        answer: 1
    },
    {
        type: 'multi',
        question: 'Which are valid ways to center a div in CSS? (Select all that apply)',
        options: ['margin: auto', 'display: flex; justify-content: center', 'text-align: center', 'position: absolute with transform'],
        answers: [0, 1, 3]
    }
];

let current = 0;
let score = 0;
let selectedMulti = [];
let answered = false;
let phase = 'splash';

const card = document.getElementById('mainCard');
const qCount = document.getElementById('qCount');
const progressFill = document.getElementById('progressFill');

function updateProgress() {
    const pct = (current / questions.length) * 100;
    progressFill.style.width = pct + '%';
    qCount.textContent = `${current} / ${questions.length}`;
}

function showSplash() {
    phase = 'splash';
    qCount.textContent = '';
    progressFill.style.width = '0%';
    card.innerHTML = `
        <div class="splash">
            <h1>Interactive Quiz</h1>
            <p>Test your web development knowledge with ${questions.length} questions<br>across 3 different question types.</p>
            <div class="type-pills">
                <span class="pill badge-single">Single Choice</span>
                <span class="pill badge-multi">Multi Select</span>
                <span class="pill badge-fill">Fill in the Blank</span>
            </div>
            <button class="start-btn" onclick="startQuiz()">Start Quiz →</button>
        </div>`;
}

function startQuiz() {
    current = 0; score = 0; answered = false; selectedMulti = [];
    phase = 'quiz';
    renderQuestion();
}

function renderQuestion() {
    const q = questions[current];
    answered = false;
    selectedMulti = [];
    updateProgress();

    let badgeClass, badgeIcon, badgeLabel;
    if (q.type === 'single') { badgeClass = 'badge-single'; badgeIcon = '◉'; badgeLabel = 'Single Choice'; }
    else if (q.type === 'multi') { badgeClass = 'badge-multi'; badgeIcon = '☑'; badgeLabel = 'Multi Select'; }
    else { badgeClass = 'badge-fill'; badgeIcon = '✎'; badgeLabel = 'Fill in the Blank'; }

    let body = '';

    if (q.type === 'single') {
        body = `<div class="options-grid">` +
            q.options.map((opt, i) => `
                <button class="option-btn" id="opt${i}" onclick="selectSingle(${i})">
                    <span class="marker">${String.fromCharCode(65+i)}</span>
                    <span>${opt}</span>
                </button>`).join('') +
            `</div>`;
    } else if (q.type === 'multi') {
        body = `<div class="options-grid">` +
            q.options.map((opt, i) => `
                <button class="option-btn multi" id="opt${i}" onclick="toggleMulti(${i})">
                    <span class="marker" id="mark${i}">${String.fromCharCode(65+i)}</span>
                    <span>${opt}</span>
                </button>`).join('') +
            `</div>
            <div class="card-footer">
                <span class="feedback" id="feedback"></span>
                <button class="submit-btn" onclick="submitMulti()">Submit →</button>
            </div>`;
    } else {
        body = `
            <input class="fill-input" id="fillInput" placeholder="Type your answer…" 
                   onkeydown="if(event.key==='Enter') submitFill()">
            <div class="fill-hint" id="fillHint">${q.hint}</div>`;
    }

    card.innerHTML = `
        <div>
            <span class="type-badge ${badgeClass}">${badgeIcon} ${badgeLabel}</span>
            <div class="question-text">${q.question}</div>
            ${body}
            ${q.type !== 'multi' ? `
            <div class="card-footer">
                <span class="feedback" id="feedback"></span>
                ${q.type === 'fill' ? `<button class="submit-btn" onclick="submitFill()">Submit →</button>` : ''}
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
                    ${current < questions.length - 1 ? 'Next →' : 'Finish →'}
                </button>
            </div>` : ''}
        </div>`;

    if (q.type === 'multi') {
        // Re-add footer with next button
        card.querySelector('.card-footer').insertAdjacentHTML('beforeend',
            `<button class="next-btn" id="nextBtn" onclick="nextQuestion()">${current < questions.length - 1 ? 'Next →' : 'Finish →'}</button>`);
    }

    if (q.type === 'fill') {
        document.getElementById('fillInput').focus();
    }
}

function selectSingle(i) {
    if (answered) return;
    answered = true;
    const q = questions[current];
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);

    const fb = document.getElementById('feedback');
    const next = document.getElementById('nextBtn');

    if (i === q.answer) {
        document.getElementById('opt'+i).classList.add('correct');
        fb.textContent = '✓ Correct!';
        fb.className = 'feedback show right';
        score++;
    } else {
        document.getElementById('opt'+i).classList.add('wrong');
        document.getElementById('opt'+q.answer).classList.add('correct');
        fb.textContent = '✗ Wrong!';
        fb.className = 'feedback show wrong-fb';
    }
    next.classList.add('visible');
}

function toggleMulti(i) {
    if (answered) return;
    const btn = document.getElementById('opt'+i);
    const idx = selectedMulti.indexOf(i);
    if (idx === -1) {
        selectedMulti.push(i);
        btn.classList.add('selected');
    } else {
        selectedMulti.splice(idx, 1);
        btn.classList.remove('selected');
    }
}

function submitMulti() {
    if (answered || selectedMulti.length === 0) return;
    answered = true;
    const q = questions[current];
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    document.querySelector('.submit-btn').style.display = 'none';

    const correct = JSON.stringify([...q.answers].sort()) === JSON.stringify([...selectedMulti].sort());
    const fb = document.getElementById('feedback');
    const next = document.getElementById('nextBtn');

    q.answers.forEach(i => document.getElementById('opt'+i).classList.add('correct'));
    selectedMulti.forEach(i => {
        if (!q.answers.includes(i)) document.getElementById('opt'+i).classList.add('wrong');
    });

    if (correct) {
        fb.textContent = '✓ All correct!';
        fb.className = 'feedback show right';
        score++;
    } else {
        fb.textContent = '✗ Not quite — see highlighted answers.';
        fb.className = 'feedback show wrong-fb';
    }
    next.classList.add('visible');
}

function submitFill() {
    if (answered) return;
    const q = questions[current];
    const input = document.getElementById('fillInput');
    const val = input.value.trim().toLowerCase();
    answered = true;
    input.disabled = true;

    const fb = document.getElementById('feedback');
    const next = document.getElementById('nextBtn');
    document.querySelector('.submit-btn').style.display = 'none';

    const hint = document.getElementById('fillHint');

    if (val === q.answer.toLowerCase()) {
        input.classList.add('correct');
        fb.textContent = '✓ Correct!';
        fb.className = 'feedback show right';
        score++;
    } else {
        input.classList.add('wrong');
        fb.textContent = '✗ Wrong!';
        fb.className = 'feedback show wrong-fb';
        hint.innerHTML = `Correct answer: <span>${q.answer}</span>`;
    }
    next.classList.add('visible');
}

function nextQuestion() {
    current++;
    if (current >= questions.length) {
        showScore();
    } else {
        renderQuestion();
    }
}

function showScore() {
    const pct = Math.round((score / questions.length) * 100);
    progressFill.style.width = '100%';
    qCount.textContent = `${questions.length} / ${questions.length}`;

    let emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : pct >= 40 ? '💪' : '📚';
    let msg = pct >= 80 ? 'Excellent Work!' : pct >= 60 ? 'Good Job!' : pct >= 40 ? 'Keep Practicing!' : 'Keep Learning!';

    card.innerHTML = `
        <div class="score-screen">
            <div class="score-circle" style="--pct:${pct}">
                <div class="score-num">${pct}%</div>
            </div>
            <div class="score-title">${emoji} ${msg}</div>
            <div class="score-sub">You scored ${score} out of ${questions.length} questions</div>
            <div class="results-breakdown">
                <div class="stat-box">
                    <div class="stat-num" style="color:var(--green)">${score}</div>
                    <div class="stat-lbl">Correct</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" style="color:var(--red)">${questions.length - score}</div>
                    <div class="stat-lbl">Wrong</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" style="color:var(--accent)">${pct}%</div>
                    <div class="stat-lbl">Score</div>
                </div>
            </div>
            <button class="restart-btn" onclick="showSplash()">↩ Try Again</button>
        </div>`;
}

showSplash();
</script>
</body>
</html>
